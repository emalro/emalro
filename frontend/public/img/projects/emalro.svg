<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="emalro — personal portfolio + blog cover">
  <!-- Background (matches --bg-base) -->
  <rect width="320" height="180" fill="#0e1117" />
  <rect x="0.5" y="0.5" width="319" height="179" fill="none" stroke="#2a3038" />

  <!-- Terminal window (matches --bg-surface, --border) -->
  <rect x="14" y="16" width="292" height="148" rx="5" fill="#161b22" stroke="#2a3038" />

  <!-- Title bar (matches --bg-elevated) -->
  <path d="M14 21 a5 5 0 0 1 5 -5 h282 a5 5 0 0 1 5 5 v11 h-292 z" fill="#1f2630" />
  <line x1="14" y1="38" x2="306" y2="38" stroke="#2a3038" />
  <circle cx="26" cy="27" r="3" fill="#f85149" />
  <circle cx="36" cy="27" r="3" fill="#f0883e" />
  <circle cx="46" cy="27" r="3" fill="#3fb950" />
  <text x="160" y="31" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#8b949e">emalro.com.ar</text>

  <!-- Eyebrow (matches --accent) -->
  <text x="24" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#f0883e">// datos, decisiones, impacto</text>

  <!-- Title (matches --text-primary) -->
  <text x="24" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="bold" fill="#e6edf3">Emanuel A. Romero</text>

  <!-- Subtitle (matches --text-secondary) -->
  <text x="24" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#8b949e">Functional Analyst | Data Analyst</text>

  <!-- Section markers (matches --text-tertiary) -->
  <text x="24" y="122" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#6e7681">// 01 Experience   // 02 Education</text>
  <text x="24" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#6e7681">// 03 Projects    // 04 Blog</text>

  <!-- Status row -->
  <text x="24" y="156" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#3fb950">● online</text>
  <text x="296" y="156" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#6e7681">Astro 4 · FastAPI · Supabase</text>
</svg>
