name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate i18n shape (prebuild)
        run: npm run validate:i18n
      - name: Build
        env:
          PUBLIC_API_URL: ""
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emalro
          POSTGRES_PASSWORD: emalro
          POSTGRES_DB: emalro_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U emalro -d emalro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://emalro:emalro@localhost:5432/emalro_test
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_KEY: ci-test-service-key-not-secret
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-with-at-least-thirty-two-chars' }}
      ENV: test
      LOGIN_RATE_LIMIT: 1000/minute
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest -v
