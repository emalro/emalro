name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate i18n shape (prebuild)
        run: npm run validate:i18n
      # The build-time fetch in `lib/api.ts` requires a reachable backend
      # (the `/blog` list and `/blog/[slug]` pages call `requestBuildTime` on
      # the public API). To make the frontend build hermetic in CI, we boot
      # the FastAPI backend against a throwaway SQLite DB, run migrations,
      # load seed data, and wait for `/api/v1/health` to return 200 before
      # kicking off the Astro build.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run migrations (SQLite for frontend build)
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./emalro_frontend.db
          JWT_SECRET: ci-test-secret-with-at-least-thirty-two-chars
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: ci-test-service-key-not-secret
          ENV: test
          LOGIN_RATE_LIMIT: 1000/minute
        run: alembic upgrade head
      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./emalro_frontend.db
          JWT_SECRET: ci-test-secret-with-at-least-thirty-two-chars
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: ci-test-service-key-not-secret
          ENV: test
          LOGIN_RATE_LIMIT: 1000/minute
        run: python -m app.scripts.seed_data
      - name: Start backend in background
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./emalro_frontend.db
          JWT_SECRET: ci-test-secret-with-at-least-thirty-two-chars
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: ci-test-service-key-not-secret
          ENV: test
          LOGIN_RATE_LIMIT: 1000/minute
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo "uvicorn started with PID $!"
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become ready in 30s"
          cat /tmp/uvicorn.log
          exit 1
      - name: Build
        env:
          PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: emalro
          POSTGRES_PASSWORD: emalro
          POSTGRES_DB: emalro_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U emalro -d emalro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://emalro:emalro@localhost:5432/emalro_test
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_KEY: ci-test-service-key-not-secret
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-with-at-least-thirty-two-chars' }}
      ENV: test
      LOGIN_RATE_LIMIT: 1000/minute
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest -v
